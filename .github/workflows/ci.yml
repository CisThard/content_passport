name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Build · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Engine library (content_right/src) ──
      - name: Install library deps
        run: npm ci
      - name: Typecheck library
        run: npm run build
      - name: Test library
        run: npm test

      # ── Frontend (content_right/web) ──
      - name: Install web deps
        run: npm --prefix web ci
      - name: Build web
        run: npm --prefix web run build

  deploy:
    name: Deploy to Google Cloud Run
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      GCP_REGION: ${{ secrets.GCP_REGION || 'asia-northeast3' }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Container Image
        run: |
          IMAGE_TAG="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/content-passport-repo/app:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ secrets.GCP_SERVICE_NAME || 'content-passport-service' }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/content-passport-repo/app:${{ github.sha }}
          env_vars: |
            NODE_ENV=production
            SUI_NETWORK=testnet
            WALRUS_PUBLISHER=https://publisher.walrus-testnet.walrus.space
            WALRUS_AGGREGATOR=https://aggregator.walrus-testnet.walrus.space
            MEMWAL_SERVER_URL=https://relayer.memory.walrus.xyz
            MEMWAL_NAMESPACE=content-right-hackathon
            GCP_VERTEX_AI_ENABLED=${{ secrets.GCP_VERTEX_AI_ENABLED || 'false' }}
            GCP_FIRESTORE_ENABLED=${{ secrets.GCP_FIRESTORE_ENABLED || 'false' }}
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GCP_REGION=${{ env.GCP_REGION }}
          secrets: |
            AUTH_GOOGLE_ID=AUTH_GOOGLE_ID:latest
            AUTH_GOOGLE_SECRET=AUTH_GOOGLE_SECRET:latest
            AUTH_SECRET=AUTH_SECRET:latest
            ZKLOGIN_SALT_MASTER_SEED=ZKLOGIN_SALT_MASTER_SEED:latest
            SUI_PRIVATE_KEY=SUI_PRIVATE_KEY:latest
            MEMWAL_PRIVATE_KEY=MEMWAL_PRIVATE_KEY:latest
            MEMWAL_ACCOUNT_ID=MEMWAL_ACCOUNT_ID:latest
            GOOGLE_GENERATIVE_AI_API_KEY=GOOGLE_GENERATIVE_AI_API_KEY:latest
