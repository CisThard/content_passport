<!doctype html>
<html lang="en" class="notranslate">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Passport — Gate 2.7 Portal</title>
    <!-- Premium Fonts -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght=0,600;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Clean up old service worker if registered previously -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (const registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
  </head>
  <body>
    <!-- Ambient Nebulas & particles -->
    <div class="magic-ambient-layer">
      <div class="nebula nebula-top"></div>
      <div class="nebula nebula-bottom"></div>
      <div class="stardust-particles"></div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
